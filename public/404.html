<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Medauc - Redirecting...</title>
    <script type="text/javascript">
      // Single Page App redirect for GitHub Pages
      // Stores the current path in sessionStorage and redirects to index.html
      // The index.html script will restore the correct route
      var pathSegmentsToKeep = 1; // Keep '/medauc' segment
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/'
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
